<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="formcontrols.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    

</head>
<body>
    <div class="row">
    
  <div class="mb-3 col">
    <h2>Form Demo</h2>
    <form class="mb3">
        <label class="form-label" for="Email">Email</label>
        <input type="text" class="form-control" placeholder="Email" id="email">

          <label class="form-label" for="Password">Password</label>
        <input type="password" class="form-control" placeholder="Password" id="Password">

          <label class="form-label" for="Password " for="address">Address</label>
        <input type="address" class="form-control-sm" placeholder="address" id="address">
    </form>
<br>
  </div>  
  <!-- //13  -->
 
  <div class="mb-3 col">
     <select class="form-select-sm">
        <option value="0">Select option</option>
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <!-- TO GET ATTRIBUTES SEARCH ON CHAT GPT BOOTSTRAP ONES-->
     </select>
  </div>
  </div>

  <div class="normal mb-3 form-check">
   <input type="checkbox" id="agree">
    <label for="agree">Agree</label>
 </div>

 <div class="mb-3 form-check">
    <input type="checkbox" id="agree" class="form-check-input">
    <label for="agree" class="form-check-label">Agree</label>
 </div>

  <div class="mb-3 form-check">
    <input type="radio" id="radio" class="form-check-input">
    <label for="radio" class="form-check-label">Agree</label>
 </div>

 <div class="form-check form-switch mb-3">
<input class="form-check-input" type="checkbox" role="switch" id="flexSwitchCheckDemo">
<label class="form-check-label" for="flexSwitchCheckDemo">Boost</label>

 </div>


   

   
</body> 
</html>
